<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Cozy Bean Café</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
   <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-cream shadow-sm fixed-top">
    <div class="container">
       <a class="navbar-brand text-brown" href="index.html"> <img src="images/headerlogo.png" alt="Cozy Bean Café Logo" style="height:40px; vertical-align:middle; margin-right:8px;">Cozy Bean Café</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link text-brown" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link text-brown" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link text-brown" href="gallery.html">Gallery</a></li>
          <li class="nav-item"><a class="nav-link text-brown" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link text-brown" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contact Form Section -->
  <div class="container py-5">
    <h2 class="text-center text-brown mb-4">Get In Touch</h2>
    <div class="row">
      <div class="col-md-6">
        <form>
          <div class="mb-3">
            <label class="form-label text-brown">Name</label>
            <input type="text" class="form-control" placeholder="Your name" required />
          </div>
          <div class="mb-3">
            <label class="form-label text-brown">Email</label>
            <input type="email" class="form-control" placeholder="you@example.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label text-brown">Message</label>
            <textarea class="form-control" rows="4" placeholder="How can we help?" required></textarea>
          </div>
          <button type="submit" class="btn btn-green">Send Message</button>
        </form>
      </div>
      <div class="col-md-6">
        <h4 class="text-green">Opening Hours</h4>
        <ul class="list-unstyled text-brown">
          <li>Mon–Fri: 8am – 5pm</li>
          <li>Sat: 9am – 4pm</li>
          <li>Sun: Closed</li>
        </ul>
        <h4 class="text-green mt-4">Visit Us</h4>
        <p class="text-brown">123 High Street<br>Smalltown, ST1 2AB</p>
        <!-- Placeholder Map -->
        <div class="ratio ratio-16x9">
          <iframe class="rounded" src="https://maps.google.com/maps?q=london&t=&z=13&ie=UTF8&iwloc=&output=embed" allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-cream text-center p-3 mt-5">
    <small class="text-brown">&copy; 2025 Cozy Bean Café. All rights reserved.</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
